services:
  mysql:
    image: mysql:8.0
    container_name: nexaops-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nexaops}
      MYSQL_USER: ${MYSQL_USER:-nexaops}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nexaops}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexaops-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nexaops-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: nexaops-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb -p local/$${S3_BUCKET:-nexaops} || true;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-nexaops}

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nexaops-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-nexaops}:${MYSQL_PASSWORD:-nexaops}@mysql:3306/${MYSQL_DATABASE:-nexaops}
      REDIS_URL: redis://redis:6379
      REDIS_REQUIRED: ${REDIS_REQUIRED:-false}
      SMTP_REQUIRED: ${SMTP_REQUIRED:-false}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production-min-32}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production-32}
      VAULT_ENCRYPTION_KEY: ${VAULT_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      API_PORT: 3001
      API_URL: ${API_URL:-http://localhost:3001}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@nexaops.local}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-nexaops}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_REGION: ${S3_REGION:-us-east-1}
      AUTO_TICKET_ON_CRITICAL: ${AUTO_TICKET_ON_CRITICAL:-true}
      REMOTE_PROVIDER: ${REMOTE_PROVIDER:-rdp}
      REMOTE_URL_TTL_SEC: ${REMOTE_URL_TTL_SEC:-3600}
      GUACAMOLE_URL: ${GUACAMOLE_URL:-}
      MESHCENTRAL_URL: ${MESHCENTRAL_URL:-}
      NOVNC_URL: ${NOVNC_URL:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: nexaops-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      - api

volumes:
  mysql_data:
  redis_data:
  minio_data:
